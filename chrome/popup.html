<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <title>Claude RTL</title>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="logo" aria-hidden="true">&#1575;A</div>
      <div class="titles">
        <h1>Claude RTL</h1>
        <p class="subtitle">Persian &amp; Arabic for claude.ai</p>
      </div>
    </div>

    <div class="row">
      <span class="label">Enable right-to-left</span>
      <label class="switch">
        <input type="checkbox" id="toggle" checked>
        <span class="track"><span class="thumb"></span></span>
      </label>
    </div>

    <p class="status" id="status">On</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
